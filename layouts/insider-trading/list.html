{{ define "main" }}
<article class="section">
  <div class="container">
    <header class="page-header">
      <span class="section-label">Investigation</span>
      <h1>{{ .Title }}</h1>
      <p class="lead">{{ .Description }}</p>
    </header>
    <div class="content">
      {{ .Content }}
    </div>
    {{ if .Pages }}
    <div class="card-grid mt-8">
      {{ range .Pages.ByDate.Reverse }}
        {{ if not .Draft }}
          {{ partial "investigation-card.html" . }}
        {{ end }}
      {{ end }}
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
