{{ define "main" }}
<article class="section">
  <div class="container">
    <a href="/insider-trading/" class="back-link">&larr; Insider Trading</a>
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ with .Date }}<p class="article-date">{{ .Format "January 2, 2006" }}</p>{{ end }}
    </header>
    <div class="content prose">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
